<div class="page">
  <div class="page-header">
    <div>
      <h1>{{ isEdit() ? 'Modifier le client' : 'Nouveau client' }}</h1>
      <p>{{ isEdit() ? 'Mettez à jour les informations du client' : 'Ajoutez un nouveau client' }}</p>
    </div>
  </div>

  <div class="card card-form">
    @if (error()) {
      <div class="alert-error">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="form">
      <div class="form-group">
        <label>Nom *</label>
        <input type="text" [(ngModel)]="form.name" name="name" placeholder="Nom du client" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="form.email" name="email" placeholder="email@exemple.com" />
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input type="tel" [(ngModel)]="form.phone" name="phone" placeholder="+33 6 00 00 00 00" />
        </div>
      </div>

      <div class="form-group">
        <label>Adresse</label>
        <input type="text" [(ngModel)]="form.address" name="address" placeholder="Adresse complète" />
      </div>

      <div class="form-actions">
        <a routerLink="/clients" class="btn btn-outline">Annuler</a>
        <button type="submit" class="btn btn-primary" [disabled]="loading()">
          {{ loading() ? 'Sauvegarde...' : (isEdit() ? 'Mettre à jour' : 'Créer le client') }}
        </button>
      </div>
    </form>
  </div>
</div>
