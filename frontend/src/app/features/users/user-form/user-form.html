<div class="page">
  <div class="page-header">
    <div>
      <h1>Nouvel utilisateur</h1>
      <p>Créez un nouveau compte utilisateur</p>
    </div>
  </div>

  <div class="card card-form">
    @if (error()) {
      <div class="alert-error">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="form">
      <div class="form-group">
        <label>Nom complet *</label>
        <input type="text" [(ngModel)]="form.name" name="name" placeholder="Prénom Nom" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email *</label>
          <input type="email" [(ngModel)]="form.email" name="email" placeholder="email@exemple.com" />
        </div>
        <div class="form-group">
          <label>Mot de passe *</label>
          <input type="password" [(ngModel)]="form.password" name="password" placeholder="••••••••" />
        </div>
      </div>

      <div class="form-group">
        <label>Rôle</label>
        <select [(ngModel)]="form.role" name="role">
          <option value="agent">Agent</option>
          <option value="manager">Manager</option>
          <option value="admin">Administrateur</option>
        </select>
      </div>

      <div class="form-actions">
        <a routerLink="/users" class="btn btn-outline">Annuler</a>
        <button type="submit" class="btn btn-primary" [disabled]="loading()">
          {{ loading() ? 'Création...' : 'Créer l\'utilisateur' }}
        </button>
      </div>
    </form>
  </div>
</div>
