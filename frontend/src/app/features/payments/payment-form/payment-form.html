<div class="page">
  <div class="page-header">
    <div>
      <h1>Enregistrer un paiement</h1>
      <p>Ajoutez un paiement à une facture existante</p>
    </div>
  </div>

  <div class="card card-form">
    @if (error()) {
      <div class="alert-error">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="form">
      <div class="form-group">
        <label>Facture *</label>
        <select [(ngModel)]="form.invoice" name="invoice">
          <option value="">Sélectionnez une facture</option>
          @for (invoice of invoices(); track invoice._id) {
            <option [value]="invoice._id">
              {{ getClientName(invoice.client) }} — {{ invoice.amount | currency:'EUR':'symbol':'1.2-2' }} ({{ invoice.status }})
            </option>
          }
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Montant (€) *</label>
          <input type="number" [(ngModel)]="form.amount" name="amount" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" [(ngModel)]="form.date" name="date" />
        </div>
      </div>

      <div class="form-group">
        <label>Mode de paiement</label>
        <select [(ngModel)]="form.method" name="method">
          <option value="cash">Espèces</option>
          <option value="card">Carte bancaire</option>
          <option value="bank">Virement bancaire</option>
        </select>
      </div>

      <div class="form-actions">
        <a routerLink="/invoices" class="btn btn-outline">Annuler</a>
        <button type="submit" class="btn btn-primary" [disabled]="loading()">
          {{ loading() ? 'Enregistrement...' : 'Enregistrer le paiement' }}
        </button>
      </div>
    </form>
  </div>
</div>
