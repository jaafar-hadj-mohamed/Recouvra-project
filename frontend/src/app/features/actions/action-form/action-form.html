<div class="page">
  <div class="page-header">
    <div>
      <h1>Nouvelle action</h1>
      <p>Enregistrez une action de recouvrement</p>
    </div>
  </div>

  <div class="card card-form">
    @if (error()) {
      <div class="alert-error">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="form">
      <div class="form-row">
        <div class="form-group">
          <label>Client *</label>
          <select [(ngModel)]="form.client" name="client">
            <option value="">Sélectionnez un client</option>
            @for (client of clients(); track client._id) {
              <option [value]="client._id">{{ client.name }}</option>
            }
          </select>
        </div>
        <div class="form-group">
          <label>Type d'action *</label>
          <select [(ngModel)]="form.type" name="type">
            <option value="call">Appel téléphonique</option>
            <option value="email">Email</option>
            <option value="visit">Visite</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Agent</label>
          <select [(ngModel)]="form.agent" name="agent">
            <option value="">Aucun agent</option>
            @for (user of users(); track user._id) {
              <option [value]="user._id">{{ user.name }} ({{ user.role }})</option>
            }
          </select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" [(ngModel)]="form.date" name="date" />
        </div>
      </div>

      <div class="form-group">
        <label>Note</label>
        <textarea [(ngModel)]="form.note" name="note" rows="4" placeholder="Détails de l'action..."></textarea>
      </div>

      <div class="form-actions">
        <a routerLink="/actions" class="btn btn-outline">Annuler</a>
        <button type="submit" class="btn btn-primary" [disabled]="loading()">
          {{ loading() ? 'Création...' : 'Enregistrer l\'action' }}
        </button>
      </div>
    </form>
  </div>
</div>
